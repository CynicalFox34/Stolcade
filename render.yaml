services:
  - type: web
    name: stolcade
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stolcade-db
          property: connectionString
      - key: STOLCADE_SECRET
        generateValue: true

databases:
  - name: stolcade-db
    plan: free
